<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aesculus at Kew 2026</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    #container {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    #map {
      flex: 1;
    }

    #sidebar {
      width: 320px;
      background: #f4f4f4;
      border-left: 1px solid #ccc;
      padding: 20px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    h2 {
      margin-top: 0;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 10px;
    }

    select {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-bottom: 20px;
    }

    .info {
      font-size: 14px;
      color: #555;
    }

    .leaflet-popup-content {
      font-size: 14px;
    }
  </style>
</head>
<body>

<div id="container">
  <div id="map"></div>

  <div id="sidebar">
    <h2>Tree Filter</h2>

    <label for="treeFilter">Scientific Name</label>

    <select id="treeFilter">
      <option value="ALL">Show All Trees</option>
    </select>

    <div class="info">
      Select a scientific name to filter the map.
    </div>
  </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- PapaParse for CSV parsing -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
  // =========================================================
  // GOOGLE SHEET CSV URL
  // =========================================================
  // Replace this with your published Google Sheet CSV URL
  //
  // Example:
  // https://docs.google.com/spreadsheets/d/e/XXXXX/pub?output=csv
  //
  const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSpsHzVFeQ1DqmEEpe79vrAzaNYYctneab21n7UbHZFaTFxhWJNUpxFwmnEV_HnDuCGohXFhGVxOkhJ/pub?output=csv";

  // =========================================================
  // INITIALISE MAP
  // =========================================================
  const map = L.map('map').setView([0, 0], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // =========================================================
  // STORAGE
  // =========================================================
  let allData = [];
  let currentMarkers = [];

  // =========================================================
  // LOAD CSV DATA
  // =========================================================
  Papa.parse(SHEET_CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,

    complete: function(results) {
      allData = results.data;

      populateDropdown(allData);
      displayMarkers(allData);
    }
  });

  // =========================================================
  // POPULATE DROPDOWN
  // =========================================================
  function populateDropdown(data) {
    const dropdown = document.getElementById("treeFilter");

    // Get unique scientific names
    const uniqueNames = [
      ...new Set(
        data
          .map(row => row["Scientific name"])
          .filter(name => name && name.trim() !== "")
      )
    ].sort();

    uniqueNames.forEach(name => {
      const option = document.createElement("option");
      option.value = name;
      option.textContent = name;
      dropdown.appendChild(option);
    });
  }

  // =========================================================
  // DISPLAY MARKERS
  // =========================================================
  function displayMarkers(data) {

    // Remove existing markers
    clearMarkers();

    const bounds = [];

    data.forEach(row => {

      const lat = parseFloat(row["Latitude"]);
      const lng = parseFloat(row["Longitude"]);
      const scientificName = row["Scientific name"];

      // Skip invalid coordinates
      if (isNaN(lat) || isNaN(lng)) return;

      const marker = L.marker([lat, lng])
        .addTo(map)
        .bindPopup(`
          <strong>${scientificName || "Unknown Tree"}</strong><br>
          Latitude: ${lat}<br>
          Longitude: ${lng}
        `);

      currentMarkers.push(marker);
      bounds.push([lat, lng]);
    });

    // Fit map to visible markers
    if (bounds.length > 0) {
      map.fitBounds(bounds, {
        padding: [50, 50]
      });
    }
  }

  // =========================================================
  // CLEAR MARKERS
  // =========================================================
  function clearMarkers() {
    currentMarkers.forEach(marker => {
      map.removeLayer(marker);
    });

    currentMarkers = [];
  }

  // =========================================================
  // FILTER DROPDOWN EVENT
  // =========================================================
  document.getElementById("treeFilter").addEventListener("change", function() {

    const selected = this.value;

    // Clear all points first
    clearMarkers();

    // Show all
    if (selected === "ALL") {
      displayMarkers(allData);
      return;
    }

    // Filter by scientific name
    const filtered = allData.filter(row =>
      row["Scientific name"] === selected
    );

    displayMarkers(filtered);
  });

</script>

</body>
</html>
